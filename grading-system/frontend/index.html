<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自動採点システム</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; color: #333; }

    /* ─── タブ ─────────────────────────────────── */
    .tabs { display: flex; background: #2c3e50; flex-wrap: wrap; }
    .tab-btn {
      padding: 13px 22px; color: #aaa; border: none; background: none;
      font-size: 14px; cursor: pointer; white-space: nowrap;
    }
    .tab-btn.active { color: #fff; border-bottom: 3px solid #3498db; }
    .tab-pane { display: none; padding: 20px; }
    .tab-pane.active { display: block; }

    /* ─── カード ───────────────────────────────── */
    .card {
      background: #fff; border-radius: 8px; padding: 20px;
      margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    h2 { font-size: 17px; margin-bottom: 14px; color: #2c3e50; }

    /* ─── フォーム ─────────────────────────────── */
    .upload-area {
      border: 2px dashed #ccc; border-radius: 8px; padding: 30px;
      text-align: center; background: #fafafa;
    }
    .upload-area p { margin-bottom: 10px; color: #555; }
    .upload-row { display: flex; align-items: center; gap: 12px; margin: 8px 0; flex-wrap: wrap; justify-content: center; }
    .upload-row label { font-size: 13px; color: #666; }
    input[type="file"] { font-size: 13px; }

    /* ─── ボタン ───────────────────────────────── */
    .btn { padding: 9px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; }
    .btn-primary  { background: #3498db; color: #fff; }
    .btn-primary:hover  { background: #2980b9; }
    .btn-success  { background: #27ae60; color: #fff; }
    .btn-success:hover  { background: #219a52; }
    .btn-danger   { background: #e74c3c; color: #fff; }
    .btn-danger:hover   { background: #c0392b; }
    .btn:disabled { background: #bdc3c7; cursor: default; }

    /* ─── ステータス ───────────────────────────── */
    .status { padding: 10px 14px; border-radius: 6px; margin-top: 10px; font-size: 13px; }
    .status.info    { background: #eaf4fb; color: #1a5276; }
    .status.success { background: #eafaf1; color: #1e8449; }
    .status.error   { background: #fdedec; color: #922b21; }

    /* ─── ローダー ─────────────────────────────── */
    .loader { display: none; text-align: center; padding: 20px; color: #777; font-size: 14px; }
    .loader.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 24px; height: 24px;
      border: 3px solid #ddd; border-top-color: #3498db;
      border-radius: 50%; animation: spin .8s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }

    /* ─── 解答用紙プレビュー（共通）─────────────── */
    .page-preview-wrap {
      overflow: auto; max-height: 75vh;
      border: 1px solid #ddd; border-radius: 6px; background: #fafafa;
    }
    .page-preview-inner { position: relative; display: inline-block; min-width: 100%; }
    .page-preview-inner img { display: block; width: 100%; }
    .page-preview-inner svg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
    }
    /* Tab①②のオーバーレイは pointer-events: all で上書き */
    #gradePreviewInner svg { pointer-events: all; }
    #pagePreviewInner svg  { pointer-events: all; }

    /* ─── 採点グリッド（Phase 3）─────────────────── */
    #tab-review .card { overflow: hidden; }
    .grid-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .grid-toolbar .stat { font-size: 13px; color: #555; }
    .grid-toolbar .stat span { font-weight: bold; }

    .table-wrap { overflow-x: auto; max-height: 72vh; overflow-y: auto; border: 1px solid #e0e0e0; border-radius: 6px; }
    #gradeGrid { border-collapse: collapse; font-size: 13px; min-width: max-content; }

    #gradeGrid thead th {
      background: #2c3e50; color: #fff; padding: 7px 6px;
      position: sticky; top: 0; z-index: 10; white-space: nowrap;
      border-right: 1px solid #3d5166; text-align: center;
    }
    #gradeGrid thead th:first-child,
    #gradeGrid thead th:nth-child(2) {
      position: sticky; z-index: 20; left: 0;
    }
    #gradeGrid thead th:nth-child(2) { left: 70px; }

    #gradeGrid tbody tr:nth-child(even) { background: #f9f9f9; }
    #gradeGrid tbody tr:hover > td { filter: brightness(0.96); }

    #gradeGrid td { padding: 5px 6px; border-right: 1px solid #eee; border-bottom: 1px solid #eee; text-align: center; white-space: nowrap; }

    /* 固定列 */
    #gradeGrid td.col-sno,
    #gradeGrid td.col-name,
    #gradeGrid td.col-score {
      background: inherit; position: sticky; z-index: 5;
    }
    #gradeGrid td.col-sno  { left: 0; min-width: 68px; }
    #gradeGrid td.col-name { left: 70px; min-width: 90px; border-right: 2px solid #ccc; }
    #gradeGrid td.col-score { right: 0; min-width: 58px; border-left: 2px solid #ccc; font-weight: bold; }

    /* 出席番号 review 強調 */
    #gradeGrid td.col-sno.sno-review { background: #fdebd0 !important; color: #935116; }

    /* セル色分け */
    .judge-correct { background: #d5f5e3 !important; }
    .judge-wrong   { background: #fadbd8 !important; }
    .judge-blank   { background: #f2f3f4 !important; color: #aaa; }
    .judge-review  { background: #fef9e7 !important; color: #7d6608; }

    /* セル編集 */
    .answer-cell-inner { cursor: pointer; min-width: 28px; display: inline-block; }
    .answer-cell-inner:hover { opacity: .75; }
    .cell-select { width: 52px; font-size: 12px; border: none; background: transparent; cursor: pointer; }

    /* 凡例 */
    .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; }
    .legend-box { width: 16px; height: 16px; border-radius: 3px; border: 1px solid #ccc; }

    /* 確定バナー */
    .confirmed-banner {
      background: #1a5276; color: #fff; text-align: center; padding: 10px;
      border-radius: 6px; font-weight: bold; margin-bottom: 12px; font-size: 14px;
    }

    /* ─── 正解ページビュー（Tab①）────────────── */
    .ak-summary-bar {
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
      background: #eafaf1; border-radius: 6px; padding: 8px 16px;
      margin-bottom: 12px; font-size: 13px; color: #2c3e50;
    }
    .ak-summary-bar .review-count { color: #e67e22; font-weight: bold; }
    .ak-summary-bar .review-count.zero { color: #27ae60; }

    /* ─── 採点ページナビ（Tab②）───────────────── */
    .grade-nav-bar {
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .grade-nav-btn {
      background: #3498db; color: #fff; border: none; border-radius: 6px;
      padding: 5px 16px; font-size: 20px; cursor: pointer; line-height: 1.2;
    }
    .grade-nav-btn:disabled { background: #bdc3c7; cursor: default; }
    .grade-page-counter { font-size: 14px; color: #555; min-width: 55px; text-align: center; }
    .grade-student-bar {
      flex: 1; min-width: 200px; font-size: 13px; color: #2c3e50;
      background: #eaf4fb; border-radius: 6px; padding: 7px 14px;
    }
    .sno-edit { cursor: pointer; text-decoration: underline dotted; color: #2980b9; }
    .sno-edit:hover { color: #1a5276; }

    /* ─── オーバーレイ編集ポップアップ ──────────── */
    #gradeOverlayEditor, #akOverlayEditor {
      display: none; position: fixed; z-index: 9999;
      background: #fff; border: 1px solid #aaa; border-radius: 8px;
      padding: 10px 14px; box-shadow: 0 4px 16px rgba(0,0,0,.25);
    }
    #gradeOverlayEditor .oe-label, #akOverlayEditor .oe-label {
      font-size: 12px; color: #777; margin-bottom: 6px;
    }
    #gradeOverlayEditor select, #akOverlayEditor select {
      font-size: 16px; padding: 4px 8px; border: 1px solid #ccc;
      border-radius: 4px; width: 100%;
    }
  </style>
</head>
<body>

<div class="tabs">
  <button class="tab-btn active" data-tab="tab-answer-key" onclick="showTab(this)">① 正解登録</button>
  <button class="tab-btn"        data-tab="tab-grade"      onclick="showTab(this)">② 採点</button>
  <button class="tab-btn"        data-tab="tab-review"     onclick="showTab(this)">③ 一覧・修正</button>
  <button class="tab-btn"        data-tab="tab-export"     onclick="showTab(this)">④ 出力</button>
</div>

<!-- ① 正解登録 -->
<div id="tab-answer-key" class="tab-pane active">
  <div class="card">
    <h2>正解 PDF をアップロード</h2>
    <div class="upload-area">
      <p>正解が記入された解答用紙 PDF を選択してください。</p>
      <div class="upload-row">
        <label>PDF ファイル: <input type="file" id="akFile" accept=".pdf,image/*"></label>
        <button class="btn btn-primary" id="akBtn" onclick="uploadAnswerKey()">OCR 解析 → 正解登録</button>
      </div>
    </div>
    <div class="loader" id="akLoader"><span class="spinner"></span>OCR 処理中（30 秒〜2 分）…</div>
    <div id="akStatus"></div>
  </div>
  <!-- 正解ページビュー（OCR後に表示） -->
  <div class="card" id="akPageCard" style="display:none">
    <div class="ak-summary-bar" id="akSummaryBar"></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:8px;font-size:12px">
      <span><span style="display:inline-block;width:14px;height:14px;background:#27ae6644;border:2px solid #27ae60;vertical-align:middle;margin-right:4px;border-radius:2px"></span>自動読取</span>
      <span><span style="display:inline-block;width:14px;height:14px;background:#e67e2244;border:2px solid #e67e22;vertical-align:middle;margin-right:4px;border-radius:2px"></span>要確認</span>
      <span><span style="display:inline-block;width:14px;height:14px;background:#e74c3c44;border:2px solid #e74c3c;vertical-align:middle;margin-right:4px;border-radius:2px"></span>未入力</span>
      <span style="color:#aaa;margin-left:6px;">セルをクリックで修正</span>
    </div>
    <div class="page-preview-wrap">
      <div class="page-preview-inner" id="pagePreviewInner">
        <img id="pagePreviewImg" src="" alt="解答用紙">
        <svg id="pagePreviewSvg"></svg>
      </div>
    </div>
    <div id="akPageStatus" style="margin-top:8px"></div>
  </div>
</div>

<!-- ② 採点 -->
<div id="tab-grade" class="tab-pane">
  <!-- アップロードカード -->
  <div class="card" id="gradeUploadCard">
    <h2>生徒答案をアップロード</h2>
    <div class="upload-area">
      <p>生徒答案 PDF（1人1ページ）をアップロードしてください。</p>
      <div class="upload-row">
        <label>答案 PDF: <input type="file" id="gradeFile" accept=".pdf,image/*"></label>
      </div>
      <div class="upload-row">
        <label>名簿 CSV（任意）: <input type="file" id="rosterFile" accept=".csv"></label>
      </div>
      <div class="upload-row">
        <button class="btn btn-primary" id="gradeBtn" onclick="startGrading()">採点開始</button>
      </div>
    </div>
    <div class="loader" id="gradeLoader"><span class="spinner"></span>OCR &amp; 採点処理中…</div>
    <div id="gradeStatus"></div>
  </div>

  <!-- 1ページビュー（採点後に表示） -->
  <div class="card" id="gradePageCard" style="display:none">
    <div class="grade-nav-bar">
      <button class="grade-nav-btn" id="gradePrevBtn" onclick="gradeNav(-1)" disabled>&#8592;</button>
      <span class="grade-page-counter" id="gradePageCounter">1 / 1</span>
      <button class="grade-nav-btn" id="gradeNextBtn" onclick="gradeNav(1)" disabled>&#8594;</button>
      <div class="grade-student-bar" id="gradeStudentBar"></div>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:8px;font-size:12px">
      <span><span style="display:inline-block;width:14px;height:14px;background:#d5f5e344;border:2px solid #27ae60;vertical-align:middle;margin-right:4px;border-radius:2px"></span>正解</span>
      <span><span style="display:inline-block;width:14px;height:14px;background:#fadbd844;border:2px solid #e74c3c;vertical-align:middle;margin-right:4px;border-radius:2px"></span>不正解</span>
      <span><span style="display:inline-block;width:14px;height:14px;background:#f2f3f4;border:2px solid #95a5a6;vertical-align:middle;margin-right:4px;border-radius:2px"></span>無答</span>
      <span><span style="display:inline-block;width:14px;height:14px;background:#fef9e744;border:2px solid #e67e22;vertical-align:middle;margin-right:4px;border-radius:2px"></span>要確認</span>
      <span style="color:#aaa;margin-left:6px;">セルをクリックで修正</span>
    </div>
    <div class="page-preview-wrap">
      <div class="page-preview-inner" id="gradePreviewInner">
        <img id="gradePageImg" alt="答案用紙">
        <svg id="gradePageSvg"></svg>
      </div>
    </div>
    <div id="gradePageStatus" style="margin-top:8px"></div>
  </div>
</div>

<!-- ③ 一覧・修正 -->
<div id="tab-review" class="tab-pane">
  <div class="card">
    <h2>採点結果 — 一覧・修正</h2>
    <div id="confirmedBanner" style="display:none" class="confirmed-banner">✓ このセッションは確定済みです</div>
    <div class="grid-toolbar">
      <div class="legend">
        <div class="legend-item"><div class="legend-box" style="background:#d5f5e3"></div>正解</div>
        <div class="legend-item"><div class="legend-box" style="background:#fadbd8"></div>不正解</div>
        <div class="legend-item"><div class="legend-box" style="background:#f2f3f4"></div>無答</div>
        <div class="legend-item"><div class="legend-box" style="background:#fef9e7"></div>要確認</div>
        <div class="legend-item"><div class="legend-box" style="background:#fdebd0"></div>番号不明</div>
      </div>
      <div class="stat" id="gridStat"></div>
      <button class="btn btn-success" id="confirmBtn" onclick="confirmSession()" style="margin-left:auto">確定</button>
    </div>
    <div id="reviewStatus"></div>
    <div class="table-wrap">
      <table id="gradeGrid"></table>
    </div>
  </div>
</div>

<!-- ④ 出力 -->
<div id="tab-export" class="tab-pane">
  <div class="card">
    <h2>CSV 出力</h2>
    <p style="font-size:13px;margin-bottom:12px;">確定済みセッションを CSV でダウンロードします。</p>
    <div id="exportSessionInfo" style="font-size:13px;color:#666;margin-bottom:12px;"></div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <label style="font-size:13px;">エンコーディング:
        <select id="csvEncoding">
          <option value="utf-8-sig">UTF-8 (BOM付 / Excel対応)</option>
          <option value="shift_jis">Shift-JIS</option>
        </select>
      </label>
      <button class="btn btn-primary" onclick="downloadCsv()">CSV ダウンロード</button>
    </div>
    <div id="exportStatus"></div>
  </div>
</div>

<!-- オーバーレイ編集ポップアップ（Tab① 正解用） -->
<div id="akOverlayEditor">
  <div class="oe-label" id="akOverlayQLabel"></div>
  <select id="akOverlaySelect"></select>
</div>

<!-- オーバーレイ編集ポップアップ（Tab② 採点用） -->
<div id="gradeOverlayEditor">
  <div class="oe-label" id="gradeOverlayQLabel"></div>
  <select id="gradeOverlaySelect"></select>
</div>

<script>
// ─── グローバル状態 ────────────────────────────────────────────────────────
let currentSessionId = localStorage.getItem('sessionId') || null;
let currentSession   = null;
const VALID_CHOICES  = ['ア','イ','ウ','エ'];

// Tab② 状態
let gradeCurrentPage = 0;
let gradeAk          = null;   // answer key（overlay用）
let _gradeOverlayStudent = null;
let _gradeOverlayQ       = null;

// ─── タブ切替 ──────────────────────────────────────────────────────────────
function showTab(btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(btn.dataset.tab).classList.add('active');
  btn.classList.add('active');
}

function setStatus(el, msg, type) {
  el.innerHTML = `<div class="status ${type}">${msg}</div>`;
}

// ─── Phase 1: 正解登録 ────────────────────────────────────────────────────
async function uploadAnswerKey() {
  const file = document.getElementById('akFile').files[0];
  if (!file) { alert('ファイルを選択してください'); return; }
  const btn = document.getElementById('akBtn');
  btn.disabled = true;
  document.getElementById('akLoader').classList.add('active');
  document.getElementById('akStatus').innerHTML = '';
  const fd = new FormData(); fd.append('file', file);
  try {
    const res = await fetch('/api/answer-key', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || res.statusText);
    setStatus(document.getElementById('akStatus'),
      `✓ 登録完了：${data.num_questions} 問、要確認 ${data.review_count} セル`, 'success');
    gradeAk = null; // answer key が更新されたのでキャッシュをクリア
    await renderAkGrid();
  } catch(e) {
    setStatus(document.getElementById('akStatus'), `エラー: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    document.getElementById('akLoader').classList.remove('active');
  }
}

async function renderAkGrid() {
  const res = await fetch('/api/answer-key');
  if (!res.ok) return;
  const ak = await res.json();
  gradeAk = ak;
  _renderAkSummaryBar(ak);
  document.getElementById('akPageCard').style.display = 'block';
  renderPageOverlay(ak);
}

function _renderAkSummaryBar(ak) {
  const review = ak.review || {};
  const rc = Object.values(review).filter(Boolean).length;
  document.getElementById('akSummaryBar').innerHTML =
    `<span>問題数: <strong>${ak.num_questions}</strong></span>` +
    `<span>要確認: <span class="review-count${rc === 0 ? ' zero' : ''}">${rc} セル</span></span>`;
}

// ─── 解答用紙プレビュー（Tab①）─────────────────────────────────────────
function _overlayColor(val, isReview) {
  if (!val)     return '#e74c3c';
  if (isReview) return '#e67e22';
  return '#27ae60';
}

function renderPageOverlay(ak) {
  const bboxes  = ak.answer_cell_bboxes;
  const size    = ak.page_image_size;
  if (!bboxes || !size) return;

  const img  = document.getElementById('pagePreviewImg');
  const svg  = document.getElementById('pagePreviewSvg');

  img.src = `/api/answer-key/image?t=${Date.now()}`;

  svg.setAttribute('viewBox', `0 0 ${size.w} ${size.h}`);
  svg.innerHTML = '';

  const review  = ak.review  || {};
  const answers = ak.answers || {};

  Object.entries(bboxes).sort((a,b) => +a[0] - +b[0]).forEach(([q, bbox]) => {
    const [x0, y0, x1, y1] = bbox;
    const val   = answers[q] || '';
    const color = _overlayColor(val, review[q]);
    const cy    = (y0 + y1) / 2;
    const bh    = y1 - y0;
    const bw    = x1 - x0;
    const fontSize  = Math.max(10, Math.min(bh * 0.55, 28));
    const labelSize = Math.max(8, fontSize * 0.5);
    const pad       = Math.max(3, bw * 0.06);  // 左寄せ余白

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.id = `ovl-q${q}`;
    g.style.cursor = 'pointer';
    g.addEventListener('click', e => openAkOverlayEditor(q, e));

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x0); rect.setAttribute('y', y0);
    rect.setAttribute('width', bw); rect.setAttribute('height', bh);
    rect.setAttribute('fill', color + '33');
    rect.setAttribute('stroke', color);
    rect.setAttribute('stroke-width', '2');
    rect.setAttribute('rx', '2');
    g.appendChild(rect);

    const tq = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    tq.setAttribute('x', x0 + pad); tq.setAttribute('y', y0 + labelSize);
    tq.setAttribute('text-anchor', 'start');
    tq.setAttribute('font-size', labelSize);
    tq.setAttribute('fill', color);
    tq.setAttribute('font-family', 'sans-serif');
    tq.textContent = `Q${q}`;
    g.appendChild(tq);

    const tv = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    tv.id = `ovl-val-q${q}`;
    tv.setAttribute('x', x0 + pad); tv.setAttribute('y', cy + fontSize * 0.38);
    tv.setAttribute('text-anchor', 'start');
    tv.setAttribute('font-size', fontSize);
    tv.setAttribute('font-weight', 'bold');
    tv.setAttribute('fill', color);
    tv.setAttribute('font-family', 'sans-serif');
    tv.textContent = val || '?';
    g.appendChild(tv);

    svg.appendChild(g);
  });
}

function updateOverlayCell(q, val, isReview) {
  const g    = document.getElementById(`ovl-q${q}`);
  const tv   = document.getElementById(`ovl-val-q${q}`);
  if (!g || !tv) return;
  const color = _overlayColor(val, isReview);
  const rect  = g.querySelector('rect');
  if (rect) { rect.setAttribute('fill', color + '33'); rect.setAttribute('stroke', color); }
  g.querySelectorAll('text').forEach(t => t.setAttribute('fill', color));
  tv.textContent = val || '?';
}

// ─── Tab① オーバーレイ編集 ──────────────────────────────────────────────
let _akOverlayQ = null;

function openAkOverlayEditor(q, event) {
  event.stopPropagation();
  _akOverlayQ = q;

  const editor = document.getElementById('akOverlayEditor');
  const sel    = document.getElementById('akOverlaySelect');
  document.getElementById('akOverlayQLabel').textContent = `問 ${q} を修正`;

  const currentVal = gradeAk?.answers?.[q] || '';
  sel.innerHTML = '';
  ['', ...VALID_CHOICES].forEach(ch => {
    const opt = document.createElement('option');
    opt.value = ch; opt.textContent = ch || '（空）';
    if (ch === currentVal) opt.selected = true;
    sel.appendChild(opt);
  });

  const W = window.innerWidth, H = window.innerHeight;
  let left = event.clientX + 8;
  let top  = event.clientY + 8;
  if (left + 150 > W) left = event.clientX - 158;
  if (top  + 90  > H) top  = event.clientY - 98;
  editor.style.left = left + 'px';
  editor.style.top  = top  + 'px';
  editor.style.display = 'block';

  sel.focus();
  sel.onchange = () => applyAkOverlayEdit();
  setTimeout(() => {
    document.addEventListener('click', _closeAkEditorOnClickOutside, { once: true });
  }, 0);
}

function _closeAkEditorOnClickOutside(e) {
  const editor = document.getElementById('akOverlayEditor');
  if (!editor.contains(e.target)) editor.style.display = 'none';
}

async function applyAkOverlayEdit() {
  const editor = document.getElementById('akOverlayEditor');
  const val    = document.getElementById('akOverlaySelect').value;
  editor.style.display = 'none';

  const q = _akOverlayQ;
  if (!q) return;

  try {
    const res = await fetch('/api/answer-key/cell', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ q, value: val }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail);

    // キャッシュ更新
    const isReview = !val || !VALID_CHOICES.includes(val);
    if (gradeAk) {
      gradeAk.answers[q] = val;
      gradeAk.review[q]  = isReview;
    }

    // SVGオーバーレイ更新
    updateOverlayCell(q, val, isReview);

    // サマリーバー更新
    if (gradeAk) _renderAkSummaryBar(gradeAk);

    setStatus(document.getElementById('akPageStatus'), `問${q} を「${val || '（空）'}」に保存しました。`, 'success');
  } catch(e) {
    setStatus(document.getElementById('akPageStatus'), `エラー: ${e.message}`, 'error');
  }
}

// ─── Phase 2: 採点 ────────────────────────────────────────────────────────
async function startGrading() {
  const gradeFile  = document.getElementById('gradeFile').files[0];
  const rosterFile = document.getElementById('rosterFile').files[0];
  if (!gradeFile) { alert('ファイルを選択してください'); return; }
  const btn = document.getElementById('gradeBtn');
  btn.disabled = true;
  document.getElementById('gradeLoader').classList.add('active');
  document.getElementById('gradeStatus').innerHTML = '';
  document.getElementById('gradePageCard').style.display = 'none';
  try {
    if (rosterFile) {
      const fd = new FormData(); fd.append('file', rosterFile);
      await fetch('/api/roster', { method: 'POST', body: fd });
    }
    const fd = new FormData(); fd.append('file', gradeFile);
    const res = await fetch('/api/grade', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || res.statusText);
    currentSessionId = data.session_id;
    currentSession   = data;
    localStorage.setItem('sessionId', currentSessionId);
    setStatus(document.getElementById('gradeStatus'),
      `✓ 採点完了: ${data.students.length} 人分`, 'success');
    renderGrid(data);
    // 最初のページを表示
    const firstPage = getPagesSorted(data)[0] ?? 0;
    await renderGradePageView(data, firstPage);
  } catch(e) {
    setStatus(document.getElementById('gradeStatus'), `エラー: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    document.getElementById('gradeLoader').classList.remove('active');
  }
}

// ─── Tab② ページビュー ───────────────────────────────────────────────────
function getPagesSorted(session) {
  return (session.students || [])
    .map(s => s.page_index)
    .sort((a, b) => a - b);
}

function judgeColor(judge) {
  return { correct: '#27ae60', wrong: '#e74c3c', blank: '#95a5a6', review: '#e67e22' }[judge] || '#e67e22';
}

async function renderGradePageView(session, pageIndex) {
  // answer key をロード（キャッシュ済みなら再利用）
  if (!gradeAk) {
    const r = await fetch('/api/answer-key');
    if (r.ok) gradeAk = await r.json();
  }

  const pages = getPagesSorted(session);
  const pos   = pages.indexOf(pageIndex);
  const student = (session.students || []).find(s => s.page_index === pageIndex);
  if (!student) return;

  gradeCurrentPage = pageIndex;

  // ナビゲーション更新
  document.getElementById('gradePageCounter').textContent = `${pos + 1} / ${pages.length}`;
  document.getElementById('gradePrevBtn').disabled = pos <= 0;
  document.getElementById('gradeNextBtn').disabled = pos >= pages.length - 1;

  // 生徒情報バー
  _renderStudentBar(student);

  // 答案画像読み込み
  document.getElementById('gradePageImg').src =
    `/api/session/${currentSessionId}/page/${pageIndex}?t=${Date.now()}`;

  // SVG オーバーレイ描画
  renderStudentOverlay(student);

  document.getElementById('gradePageCard').style.display = 'block';
}

function _renderStudentBar(student) {
  const snoReview = student.student_no_status === 'review';
  const snoText   = student.student_no || '—';
  document.getElementById('gradeStudentBar').innerHTML =
    `出席番号: <span class="sno-edit" onclick="editGradeStudentNo(${student.page_index})" ` +
    `title="クリックで編集" style="${snoReview ? 'color:#c0392b' : ''}">${snoText}</span>` +
    `　氏名: ${student.name || '—'}` +
    `　得点: <strong id="gradeScore-${student.page_index}">${student.score}/${student.max_score}</strong>`;
}

function gradeNav(delta) {
  const pages = getPagesSorted(currentSession);
  const pos   = pages.indexOf(gradeCurrentPage);
  const next  = pos + delta;
  if (next >= 0 && next < pages.length) {
    renderGradePageView(currentSession, pages[next]);
  }
}

// ─── 答案オーバーレイ描画（Tab②）────────────────────────────────────────
function renderStudentOverlay(student) {
  const svg = document.getElementById('gradePageSvg');
  svg.innerHTML = '';
  if (!gradeAk?.answer_cell_bboxes || !gradeAk?.page_image_size) return;

  const bboxes  = gradeAk.answer_cell_bboxes;
  const size    = gradeAk.page_image_size;
  const results = student.results || {};

  svg.setAttribute('viewBox', `0 0 ${size.w} ${size.h}`);

  Object.entries(bboxes).sort((a, b) => +a[0] - +b[0]).forEach(([q, bbox]) => {
    const [x0, y0, x1, y1] = bbox;
    const r      = results[q] || {};
    const color  = judgeColor(r.judge || 'review');
    const val    = r.read || '';
    const cy     = (y0 + y1) / 2;
    const bh     = y1 - y0;
    const fontSize  = Math.max(10, Math.min(bh * 0.55, 28));
    const labelSize = Math.max(8, fontSize * 0.5);

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.id = `gov-q${q}`;
    g.style.cursor = 'pointer';
    g.addEventListener('click', e => openGradeOverlayEditor(student, q, e));

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x0); rect.setAttribute('y', y0);
    rect.setAttribute('width', x1 - x0); rect.setAttribute('height', y1 - y0);
    rect.setAttribute('fill', color + '44');
    rect.setAttribute('stroke', color);
    rect.setAttribute('stroke-width', '2');
    rect.setAttribute('rx', '2');
    g.appendChild(rect);

    const pad = Math.max(3, (x1 - x0) * 0.06);

    const tq = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    tq.setAttribute('x', x0 + pad); tq.setAttribute('y', y0 + labelSize);
    tq.setAttribute('text-anchor', 'start');
    tq.setAttribute('font-size', labelSize);
    tq.setAttribute('fill', color);
    tq.setAttribute('font-family', 'sans-serif');
    tq.textContent = `Q${q}`;
    g.appendChild(tq);

    const tv = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    tv.id = `gov-val-q${q}`;
    tv.setAttribute('x', x0 + pad); tv.setAttribute('y', cy + fontSize * 0.38);
    tv.setAttribute('text-anchor', 'start');
    tv.setAttribute('font-size', fontSize);
    tv.setAttribute('font-weight', 'bold');
    tv.setAttribute('fill', color);
    tv.setAttribute('font-family', 'sans-serif');
    tv.textContent = val;
    g.appendChild(tv);

    svg.appendChild(g);
  });
}

function _updateStudentOverlayCell(q, result) {
  const g  = document.getElementById(`gov-q${q}`);
  const tv = document.getElementById(`gov-val-q${q}`);
  if (!g || !tv) return;
  const color = judgeColor(result.judge || 'review');
  const rect  = g.querySelector('rect');
  if (rect) { rect.setAttribute('fill', color + '44'); rect.setAttribute('stroke', color); }
  g.querySelectorAll('text').forEach(t => t.setAttribute('fill', color));
  tv.textContent = result.read || '';
}

// ─── オーバーレイ編集ポップアップ ─────────────────────────────────────────
function openGradeOverlayEditor(student, q, event) {
  event.stopPropagation();
  _gradeOverlayStudent = student;
  _gradeOverlayQ       = q;

  const editor = document.getElementById('gradeOverlayEditor');
  const sel    = document.getElementById('gradeOverlaySelect');
  document.getElementById('gradeOverlayQLabel').textContent = `問 ${q} を修正`;

  const currentVal = (student.results[q] || {}).read || '';
  sel.innerHTML = '';
  ['', ...VALID_CHOICES].forEach(ch => {
    const opt = document.createElement('option');
    opt.value = ch; opt.textContent = ch || '（空）';
    if (ch === currentVal) opt.selected = true;
    sel.appendChild(opt);
  });

  // ポップアップ位置（クリック位置の近く、画面端にかからないよう調整）
  const W = window.innerWidth, H = window.innerHeight;
  let left = event.clientX + 8;
  let top  = event.clientY + 8;
  if (left + 150 > W) left = event.clientX - 158;
  if (top  + 90  > H) top  = event.clientY - 98;
  editor.style.left = left + 'px';
  editor.style.top  = top  + 'px';
  editor.style.display = 'block';

  sel.focus();
  sel.onchange = () => applyGradeOverlayEdit();

  // 外側クリックで閉じる
  setTimeout(() => {
    document.addEventListener('click', _closeGradeEditorOnClickOutside, { once: true });
  }, 0);
}

function _closeGradeEditorOnClickOutside(e) {
  const editor = document.getElementById('gradeOverlayEditor');
  if (!editor.contains(e.target)) editor.style.display = 'none';
}

async function applyGradeOverlayEdit() {
  const editor = document.getElementById('gradeOverlayEditor');
  const val    = document.getElementById('gradeOverlaySelect').value;
  editor.style.display = 'none';

  const student = _gradeOverlayStudent;
  const q       = _gradeOverlayQ;
  if (!student || !q) return;

  try {
    const res = await fetch(`/api/session/${currentSessionId}/cell`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ page_index: student.page_index, q, value: val }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail);

    student.results[q] = data.result;
    student.score     = data.score;
    student.max_score = data.max_score;

    // オーバーレイ更新
    _updateStudentOverlayCell(q, data.result);

    // 得点バー更新
    const scoreEl = document.getElementById(`gradeScore-${student.page_index}`);
    if (scoreEl) scoreEl.textContent = `${data.score}/${data.max_score}`;

    // Tab③ グリッドも同期
    _syncGridCell(student, q, data);

  } catch(e) {
    setStatus(document.getElementById('gradePageStatus'), `エラー: ${e.message}`, 'error');
  }
}

function _syncGridCell(student, q, data) {
  const tr = document.querySelector(`#gradeGrid tr[data-page-index="${student.page_index}"]`);
  if (!tr) return;
  const td = tr.querySelector(`td[data-q="${q}"]`);
  if (td) {
    td.className = `judge-${data.result.judge}`;
    const span = td.querySelector('.answer-cell-inner');
    if (span) span.textContent = data.result.read || '';
  }
  const scoreTd = document.getElementById(`score-${student.page_index}`);
  if (scoreTd) scoreTd.textContent = `${data.score}/${data.max_score}`;
}

// ─── 出席番号編集（Tab② バー内）──────────────────────────────────────────
function editGradeStudentNo(pageIndex) {
  const student = (currentSession?.students || []).find(s => s.page_index === pageIndex);
  if (!student) return;

  const bar     = document.getElementById('gradeStudentBar');
  const snoSpan = bar.querySelector('.sno-edit');
  if (!snoSpan || snoSpan.querySelector('input')) return;

  const original = student.student_no || '';
  const inp = document.createElement('input');
  inp.type = 'text'; inp.value = original;
  inp.style.cssText = 'width:54px;font-size:13px;border:1px solid #aaa;padding:2px 4px;border-radius:3px;';
  snoSpan.textContent = '';
  snoSpan.appendChild(inp);
  inp.focus(); inp.select();

  const apply = async () => {
    const val = inp.value.trim();
    try {
      const res = await fetch(`/api/session/${currentSessionId}/student-no`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ page_index: pageIndex, value: val }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail);
      student.student_no = val;
      student.student_no_status = val ? 'ok' : 'review';
      student.name = data.name || '';
      _renderStudentBar(student);
      // Tab③ 同期
      const tr = document.querySelector(`#gradeGrid tr[data-page-index="${pageIndex}"]`);
      if (tr) {
        const snoTd = tr.querySelector('.col-sno');
        if (snoTd) { snoTd.textContent = val || '—'; snoTd.className = 'col-sno' + (val ? '' : ' sno-review'); }
        const nameTd = document.getElementById(`name-${pageIndex}`);
        if (nameTd) nameTd.textContent = data.name || '—';
      }
    } catch(e) {
      inp.remove(); snoSpan.textContent = original || '—';
      setStatus(document.getElementById('gradePageStatus'), `エラー: ${e.message}`, 'error');
    }
  };
  inp.addEventListener('blur', apply);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter')  inp.blur();
    if (e.key === 'Escape') { inp.remove(); snoSpan.textContent = original || '—'; }
  });
}

// ─── Phase 3: 確認・修正グリッド ─────────────────────────────────────────
function renderGrid(data) {
  currentSession = data;
  const students = data.students || [];
  if (!students.length) { document.getElementById('gradeGrid').innerHTML = '<tr><td>データなし</td></tr>'; return; }

  const qnos = Object.keys(students[0].results || {}).sort((a,b) => +a - +b);

  let totalReview = 0, totalBlank = 0, totalCorrect = 0;
  students.forEach(s => {
    Object.values(s.results).forEach(r => {
      if (r.judge === 'review')  totalReview++;
      if (r.judge === 'blank')   totalBlank++;
      if (r.judge === 'correct') totalCorrect++;
    });
  });
  document.getElementById('gridStat').innerHTML =
    `生徒 <span>${students.length}</span> 人 / 問 <span>${qnos.length}</span> 問 ` +
    `/ 要確認 <span style="color:#7d6608">${totalReview}</span> セル ` +
    `/ 無答 <span style="color:#888">${totalBlank}</span> セル`;

  document.getElementById('confirmedBanner').style.display = data.confirmed ? 'block' : 'none';
  document.getElementById('confirmBtn').disabled = !!data.confirmed;

  const table = document.getElementById('gradeGrid');
  table.innerHTML = '';

  const thead = document.createElement('thead');
  const hr = document.createElement('tr');
  addTh(hr, '出席番号');
  addTh(hr, '氏名');
  qnos.forEach(q => addTh(hr, `Q${q}`));
  addTh(hr, '合計');
  thead.appendChild(hr); table.appendChild(thead);

  const tbody = document.createElement('tbody');
  students.forEach(s => tbody.appendChild(buildStudentRow(s, qnos)));
  table.appendChild(tbody);
}

function addTh(tr, text) {
  const th = document.createElement('th');
  th.textContent = text;
  tr.appendChild(th);
}

function buildStudentRow(student, qnos) {
  const tr = document.createElement('tr');
  tr.dataset.pageIndex = student.page_index;

  const snoTd = document.createElement('td');
  snoTd.className = 'col-sno' + (student.student_no_status === 'review' ? ' sno-review' : '');
  snoTd.textContent = student.student_no || '—';
  snoTd.title = 'クリックで編集';
  snoTd.style.cursor = 'pointer';
  snoTd.onclick = () => editStudentNo(student, snoTd, tr);
  tr.appendChild(snoTd);

  const nameTd = document.createElement('td');
  nameTd.className = 'col-name';
  nameTd.id = `name-${student.page_index}`;
  nameTd.textContent = student.name || '—';
  tr.appendChild(nameTd);

  qnos.forEach(q => {
    const r = student.results[q] || {};
    const td = document.createElement('td');
    td.className = `judge-${r.judge || 'blank'}`;
    td.dataset.q = q;
    const span = document.createElement('span');
    span.className = 'answer-cell-inner';
    span.textContent = r.read || '';
    span.title = 'クリックで編集';
    span.onclick = () => editCell(student, q, td, span, tr);
    td.appendChild(span);
    tr.appendChild(td);
  });

  const scoreTd = document.createElement('td');
  scoreTd.className = 'col-score';
  scoreTd.id = `score-${student.page_index}`;
  scoreTd.textContent = `${student.score}/${student.max_score}`;
  tr.appendChild(scoreTd);

  return tr;
}

// ─── セル編集（Tab③）────────────────────────────────────────────────────
function editCell(student, q, td, span, tr) {
  if (td.querySelector('select')) return;
  const original = span.textContent;
  span.style.display = 'none';

  const sel = document.createElement('select');
  sel.className = 'cell-select';
  ['',...VALID_CHOICES].forEach(ch => {
    const opt = document.createElement('option');
    opt.value = ch; opt.textContent = ch || '—';
    if (ch === original) opt.selected = true;
    sel.appendChild(opt);
  });
  td.appendChild(sel);
  sel.focus();

  const apply = async () => {
    const val = sel.value;
    sel.remove(); span.style.display = '';
    try {
      const res = await fetch(`/api/session/${currentSessionId}/cell`, {
        method: 'PATCH',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({page_index: student.page_index, q, value: val}),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail);
      const r = data.result;
      td.className = `judge-${r.judge}`;
      span.textContent = r.read || '';
      const scoreTd = document.getElementById(`score-${student.page_index}`);
      if (scoreTd) scoreTd.textContent = `${data.score}/${data.max_score}`;
      // Tab② オーバーレイも同期
      if (gradeCurrentPage === student.page_index) {
        student.results[q] = r;
        student.score = data.score;
        _updateStudentOverlayCell(q, r);
        const scoreEl = document.getElementById(`gradeScore-${student.page_index}`);
        if (scoreEl) scoreEl.textContent = `${data.score}/${data.max_score}`;
      }
    } catch(e) {
      span.textContent = original;
      setStatus(document.getElementById('reviewStatus'), `エラー: ${e.message}`, 'error');
    }
  };
  sel.addEventListener('change', apply);
  sel.addEventListener('blur',   apply);
}

// ─── 出席番号編集（Tab③）────────────────────────────────────────────────
function editStudentNo(student, td, tr) {
  if (td.querySelector('input')) return;
  const original = student.student_no || '';
  td.textContent = '';

  const inp = document.createElement('input');
  inp.type = 'text'; inp.value = original;
  inp.style.cssText = 'width:58px;font-size:12px;border:1px solid #aaa;padding:2px;';
  td.appendChild(inp);
  inp.focus(); inp.select();

  const apply = async () => {
    const val = inp.value.trim();
    inp.remove();
    try {
      const res = await fetch(`/api/session/${currentSessionId}/student-no`, {
        method: 'PATCH',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({page_index: student.page_index, value: val}),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail);
      student.student_no = val;
      student.student_no_status = val ? 'ok' : 'review';
      td.textContent = val || '—';
      td.className = 'col-sno' + (student.student_no_status === 'review' ? ' sno-review' : '');
      const nameTd = document.getElementById(`name-${student.page_index}`);
      if (nameTd) nameTd.textContent = data.name || '—';
      // Tab② バーも同期
      if (gradeCurrentPage === student.page_index) _renderStudentBar(student);
    } catch(e) {
      td.textContent = original || '—';
      setStatus(document.getElementById('reviewStatus'), `エラー: ${e.message}`, 'error');
    }
  };
  inp.addEventListener('blur',  apply);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') { inp.remove(); td.textContent = original || '—'; } });
}

// ─── 確定 ─────────────────────────────────────────────────────────────────
async function confirmSession() {
  if (!currentSessionId) { alert('セッションがありません'); return; }
  if (!confirm('採点を確定しますか？確定後は自動再採点されません。')) return;
  try {
    const res = await fetch(`/api/session/${currentSessionId}/confirm`, { method: 'POST' });
    if (!res.ok) throw new Error((await res.json()).detail);
    document.getElementById('confirmedBanner').style.display = 'block';
    document.getElementById('confirmBtn').disabled = true;
    setStatus(document.getElementById('reviewStatus'), '✓ 確定しました。CSV 出力タブからダウンロードできます。', 'success');
    updateExportPanel();
  } catch(e) {
    setStatus(document.getElementById('reviewStatus'), `エラー: ${e.message}`, 'error');
  }
}

// ─── Phase 4: CSV 出力 ───────────────────────────────────────────────────
function updateExportPanel() {
  const el = document.getElementById('exportSessionInfo');
  el.textContent = currentSessionId
    ? `セッション: ${currentSessionId}`
    : 'セッションがありません。先に採点してください。';
}

async function downloadCsv() {
  if (!currentSessionId) { alert('セッションがありません'); return; }
  const enc = document.getElementById('csvEncoding').value;
  const url = `/api/session/${currentSessionId}/csv?encoding=${enc}`;
  const a = document.createElement('a'); a.href = url; a.click();
}

// ─── 初期化 ──────────────────────────────────────────────────────────────
(async () => {
  try {
    const r = await fetch('/api/answer-key');
    if (r.ok) {
      const ak = await r.json();
      setStatus(document.getElementById('akStatus'),
        `既存の正解データが登録済みです（${ak.num_questions} 問）`, 'info');
      await renderAkGrid();
    }
  } catch(_) {}

  if (currentSessionId) {
    try {
      const r = await fetch(`/api/session/${currentSessionId}`);
      if (r.ok) {
        const data = await r.json();
        currentSession = data;
        updateExportPanel();
        renderGrid(data);
        const firstPage = getPagesSorted(data)[0] ?? 0;
        await renderGradePageView(data, firstPage);
      } else {
        currentSessionId = null;
        localStorage.removeItem('sessionId');
      }
    } catch(_) {}
  }
  updateExportPanel();
})();
</script>
